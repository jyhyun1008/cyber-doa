services:
  web:
    build: .
    command: sh -c "npx prisma migrate deploy && npm run start"
    ports:
      - "${PORT:-3000}:3000"
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: "file:/app/data/doa.db"
      INTERNAL_BASE_URL: "http://web:3000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  scheduler:
    build: .
    command: npm run start:scheduler
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: "file:/app/data/doa.db"
      INTERNAL_BASE_URL: "http://web:3000"
    volumes:
      - ./data:/app/data
    depends_on:
      - web
    restart: unless-stopped
